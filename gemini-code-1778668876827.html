<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTask & Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; font-family: sans-serif; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="card border-t-4 border-green-500">
            <h2 class="text-2xl font-bold mb-4">Zero-Based Budget</h2>
            <div class="bg-green-100 p-4 rounded mb-4">
                <p class="text-sm text-green-800 font-bold uppercase">To Assign</p>
                <h3 id="toAssign" class="text-3xl font-black text-green-700">$0.00</h3>
            </div>
            
            <div class="space-y-3" id="budgetList">
                </div>
            
            <button onclick="addCategory()" class="mt-4 w-full bg-green-500 text-white py-2 rounded hover:bg-green-600 transition">+ Add Category</button>
        </div>

        <div class="card border-t-4 border-blue-500">
            <h2 class="text-2xl font-bold mb-4">Uni Projects</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="taskInput" placeholder="New assignment..." class="flex-1 border p-2 rounded">
                <button onclick="addTask()" class="bg-blue-500 text-white px-4 py-2 rounded font-bold hover:bg-blue-600">+</button>
            </div>
            
            <ul class="space-y-2" id="taskList">
                </ul>
        </div>

    </div>

    <script>
        // Simple state management
        let budget = JSON.parse(localStorage.getItem('myBudget')) || { total: 1000, categories: [{name: 'Groceries', assigned: 200}] };
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];

        function render() {
            // Render Budget
            document.getElementById('toAssign').innerText = `$${budget.total.toFixed(2)}`;
            const bList = document.getElementById('budgetList');
            bList.innerHTML = budget.categories.map((cat, i) => `
                <div class="flex justify-between items-center p-2 border-b">
                    <span>${cat.name}</span>
                    <span class="font-mono bg-gray-100 px-2 rounded">$${cat.assigned}</span>
                </div>
            `).join('');

            // Render Tasks
            const tList = document.getElementById('taskList');
            tList.innerHTML = tasks.map((t, i) => `
                <li class="flex items-center gap-3 p-2 bg-gray-50 rounded">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
                    <span class="${t.done ? 'line-through text-gray-400' : ''}">${t.text}</span>
                </li>
            `).join('');

            // Save to LocalStorage
            localStorage.setItem('myBudget', JSON.stringify(budget));
            localStorage.setItem('myTasks', JSON.stringify(tasks));
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if(input.value) {
                tasks.push({ text: input.value, done: false });
                input.value = '';
                render();
            }
        }

        function toggleTask(i) {
            tasks[i].done = !tasks[i].done;
            render();
        }

        function addCategory() {
            const name = prompt("Category name?");
            const amt = prompt("Amount to assign?");
            if(name && amt) {
                budget.categories.push({ name, assigned: parseFloat(amt) });
                budget.total -= parseFloat(amt);
                render();
            }
        }

        render();
    </script>
</body>
</html>
