<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #1a1c24; 
            color: #fff; 
            min-height: 100vh;
        }
        /* Glassmorphism Effect */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .accent-lavender { background: #b4adff; color: #1a1c24; }
        .accent-sky { background: #a6d1ff; color: #1a1c24; }
        .accent-mint { background: #96f7d2; color: #1a1c24; }
        
        .tab-active { 
            color: #b4adff; 
            border-bottom: 2px solid #b4adff; 
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="pb-28">

    <div class="max-w-lg mx-auto p-6">
        <header class="mb-10 pt-6">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-2xl font-semibold tracking-tight">My Tasks</h1>
                <div class="w-10 h-10 rounded-full glass flex items-center justify-center">
                    <i data-lucide="user" class="w-5 h-5 text-white/50"></i>
                </div>
            </div>

            <div class="glass rounded-3xl p-4">
                <input id="taskInput" type="text" placeholder="What needs to be done?" 
                    class="w-full bg-transparent border-none text-lg outline-none placeholder:text-white/20 mb-3">
                
                <div class="flex items-center gap-3">
                    <select id="taskSubject" class="bg-white/5 text-xs rounded-full px-3 py-1 border border-white/10 outline-none text-white/60">
                        <option value="General">General</option>
                        <option value="University">University</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                    </select>
                    
                    <button onclick="addTask()" class="ml-auto accent-mint px-5 py-1.5 rounded-full text-sm font-semibold hover:opacity-90 transition-all">
                        Create
                    </button>
                </div>
            </div>
        </header>

        <nav class="flex justify-between border-b border-white/5 mb-8 text-xs font-bold tracking-widest uppercase text-white/30">
            <button onclick="switchView('today')" id="tab-today" class="pb-3 px-2 tab-active">Today</button>
            <button onclick="switchView('board')" id="tab-board" class="pb-3 px-2">Board</button>
            <button onclick="switchView('stats')" id="tab-stats" class="pb-3 px-2">Stats</button>
        </nav>

        <div id="taskList" class="space-y-4">
            </div>
    </div>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-sm glass rounded-[2.5rem] p-4 flex justify-around items-center shadow-2xl">
        <button class="text-mint"><i data-lucide="layout-grid"></i></button>
        <button class="text-white/30"><i data-lucide="search"></i></button>
        <div class="w-12 h-12 accent-lavender rounded-full flex items-center justify-center shadow-lg">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </div>
        <button class="text-white/30"><i data-lucide="calendar"></i></button>
        <button class="text-white/30"><i data-lucide="settings"></i></button>
    </div>

    <script>
        // --- DATA LOGIC ---
        let tasks = JSON.parse(localStorage.getItem('glass_tasks')) || [
            { id: 1, name: 'Finish project proposal', subject: 'University', status: 'todo' },
            { id: 2, name: 'Weekly team sync', subject: 'Work', status: 'done' }
        ];

        function save() {
            localStorage.setItem('glass_tasks', JSON.stringify(tasks));
            render();
        }

        // --- UI LOGIC ---
        function addTask() {
            const name = document.getElementById('taskInput').value;
            const subject = document.getElementById('taskSubject').value;
            
            if (!name) return;

            tasks.push({
                id: Date.now(),
                name: name,
                subject: subject,
                status: 'todo'
            });

            document.getElementById('taskInput').value = '';
            save();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => {
                if (t.id === id) {
                    t.status = t.status === 'done' ? 'todo' : 'done';
                }
                return t;
            });
            save();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
        }

        function render() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            tasks.forEach(task => {
                const isDone = task.status === 'done';
                const card = document.createElement('div');
                card.className = `glass p-5 rounded-[2rem] flex items-center justify-between transition-all ${isDone ? 'opacity-40 grayscale-[0.5]' : ''}`;
                
                // Color coding based on subject
                let subjectClass = 'accent-sky';
                if (task.subject === 'University') subjectClass = 'accent-lavender';
                if (task.subject === 'Personal') subjectClass = 'accent-mint';

                card.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-sm font-medium ${isDone ? 'line-through' : ''}">${task.name}</span>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="w-2 h-2 rounded-full ${subjectClass.replace('accent-', 'bg-')}"></span>
                            <span class="text-[10px] text-white/40 uppercase tracking-tighter">${task.subject}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="deleteTask(${task.id})" class="text-white/10 hover:text-red-400 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        <button onclick="toggleTask(${task.id})" class="w-10 h-10 rounded-full flex items-center justify-center transition-all ${isDone ? 'bg-mint text-black' : 'bg-white/10 text-white/50 hover:bg-white/20'}">
                            <i data-lucide="${isDone ? 'check' : 'play'}" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            
            lucide.createIcons();
        }

        // --- INITIALIZE ---
        window.onload = () => {
            render();
            lucide.createIcons();
        };

        // Handle Enter key
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
